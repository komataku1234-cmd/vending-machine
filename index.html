<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>buy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🥤 自動販売機</h1>
    <form>
        <button id="mizu" type="button">水：100円</button>
        <button id="otya" type="button">お茶：150円</button>
        <button id="kora" type="button">コーラ：200円</button>
        <button id="oturi" type="button">お釣り</button>
    </form>
    <p class="coins">
        <img id="coin10" src="10yen.png" alt="10円">
        <img id="coin50" src="50yen.png" alt="50円">
        <img id="coin100" src="100yen.png" alt="100円">
        <img id="coin500" src="500yen.png" alt="500円">
    </p>
    <div class="box"></div>
    <p id="money">お金：0</p>
    <script src="main.js"></script>
</body>
</html>
